<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0f;
            --surface: #16161a;
            --border: rgba(255,255,255,0.07);
            --text: #f0ede8;
            --muted: rgba(240,237,232,0.35);
            --accent-work:  #c8f060;
            --accent-short: #60d0f0;
            --accent-long:  #c860f0;
            --danger: #ff6b6b;
            --ring-track: rgba(255,255,255,0.06);
            --accent: var(--accent-work);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2.2rem 2.5rem 1.6rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            width: 380px;
        }

        .phase-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            transition: color 0.4s;
        }

        .ring-wrapper { position: relative; width: 220px; height: 220px; }
        .ring-wrapper svg { transform: rotate(-90deg); overflow: visible; }
        .ring-track { fill: none; stroke: var(--ring-track); stroke-width: 6; }
        .ring-fill {
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke 0.4s;
        }

        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .time-display {
            font-family: 'DM Mono', monospace;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text);
            transition: color 0.4s;
        }

        .time-display.danger { color: var(--danger); }

        .time-sub {
            font-size: 11px;
            letter-spacing: 0.14em;
            color: var(--muted);
        }

        .dots { display: flex; gap: 10px; height: 12px; align-items: center; }

        .dot.done { background: var(--accent-work); border-color: var(--accent-work); }
        .dot.current { border-color: var(--accent); transform: scale(1.3); }

        .buttons { display: flex; gap: 10px; width: 100%; }

        button {
            flex: 1;
            padding: 13px 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: rgba(240,237,232,0.7);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.14);
            color: var(--text);
        }

        button:active:not(:disabled) { transform: scale(0.96); }
        button:disabled { opacity: 0.25; cursor: not-allowed; }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #0d0d0f;
            transition: background 0.3s, border-color 0.3s, color 0.15s, transform 0.1s;
        }

        button.primary:hover:not(:disabled) { filter: brightness(1.1); }

        button.primary:disabled {
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            border-color: transparent;
            color: color-mix(in srgb, var(--accent) 40%, transparent);
            opacity: 1;
        }

        .reset-link {
            background: none;
            border: none;
            padding: 0;
            font-size: 11px;
            letter-spacing: 0.14em;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .reset-link:hover { color: var(--text); }

        .status {
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--muted);
            height: 14px;
            text-align: center;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 4px color-mix(in srgb, var(--accent) 55%, transparent)); }
            50%      { filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 85%, transparent)); }
        }

        .ring-fill.pulsing { animation: pulse-glow 2s ease-in-out infinite; }

        @keyframes tick-pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .tick { animation: tick-pop 0.18s ease-out; }

        /* ---------- історія ---------- */
        .history {
            width: 100%;
            border-top: 1px solid var(--border);
            padding-top: 0.8rem;
            margin-top: 0.3rem;
        }

        .history > summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 4px 0;
            transition: color 0.2s;
        }

        .history > summary::-webkit-details-marker { display: none; }

        .history > summary::before {
            content: '▸';
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.2s;
        }

        .history[open] > summary::before { transform: rotate(90deg); }
        .history > summary:hover { color: var(--text); }
        .history[open] > summary { color: var(--text); margin-bottom: 0.8rem; }

        .today-stats {
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.06em;
            color: var(--accent-work);
            text-transform: none;
        }

        .history-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 0.8rem;
        }

        .mini {
            flex: 1;
            padding: 7px 6px;
            font-size: 11px;
            letter-spacing: 0.06em;
            border-radius: 8px;
        }

        .mini.danger:hover:not(:disabled) {
            background: rgba(255,107,107,0.1);
            border-color: rgba(255,107,107,0.3);
            color: var(--danger);
        }

        .history-list {
            max-height: 260px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .day {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .day-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 12px;
            color: var(--muted);
        }

        .day-head .date { color: var(--text); font-weight: 500; }
        .day-head .meta { font-family: 'DM Mono', monospace; font-size: 11px; }

        .sessions { display: flex; flex-direction: column; gap: 2px; padding-top: 4px; }

        .session {
            display: flex;
            gap: 8px;
            align-items: center;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .session .time { width: 42px; color: var(--text); }
        .session .type { width: 72px; font-size: 10px; letter-spacing: 0.08em; }
        .session .type.work  { color: var(--accent-work); }
        .session .type.short { color: var(--accent-short); }
        .session .type.long  { color: var(--accent-long); }
        .session .dur { margin-left: auto; }
        .session.skipped { opacity: 0.55; }
        .session.skipped .dur::after { content: ' ⏭'; }

        .history-empty {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            padding: 1rem;
        }

        /* ---------- налаштування ---------- */
        .settings {
            width: 100%;
            border-top: 1px solid var(--border);
            padding-top: 0.8rem;
        }

        .settings > summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 4px 0;
            transition: color 0.2s;
        }

        .settings > summary::-webkit-details-marker { display: none; }

        .settings > summary::before {
            content: '▸';
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.2s;
        }

        .settings[open] > summary::before { transform: rotate(90deg); }
        .settings > summary:hover { color: var(--text); }
        .settings[open] > summary { color: var(--text); margin-bottom: 0.8rem; }

        .settings-hint {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.06em;
            color: var(--muted);
            text-transform: none;
        }

        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--muted);
        }

        .field label { letter-spacing: 0.04em; }

        .field input[type="number"] {
            width: 64px;
            padding: 6px 8px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--text);
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .field input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .field input[type="number"]::-webkit-inner-spin-button,
        .field input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .toggle {
            position: relative;
            width: 36px;
            height: 20px;
            cursor: pointer;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle .slider {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: background 0.2s, border-color 0.2s;
        }

        .toggle .slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            top: 2px;
            background: var(--muted);
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .toggle input:checked + .slider {
            background: color-mix(in srgb, var(--accent) 25%, transparent);
            border-color: var(--accent);
        }

        .toggle input:checked + .slider::before {
            transform: translateX(16px);
            background: var(--accent);
        }

        .settings-actions {
            display: flex;
            gap: 6px;
            margin-top: 0.4rem;
        }

        .settings-note {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            min-height: 14px;
            margin-top: 0.2rem;
        }

        .settings-note.ok { color: var(--accent-work); }
        .settings-note.warn { color: var(--accent-short); }
        .settings-note.err { color: var(--danger); }
    </style>
</head>
<body>

<div class="card" id="card">
    <span class="phase-label" id="phase-label">РОБОТА</span>

    <div class="ring-wrapper">
        <svg width="220" height="220" viewBox="0 0 220 220">
            <circle class="ring-track" cx="110" cy="110" r="96" />
            <circle class="ring-fill" id="ring" cx="110" cy="110" r="96"
                    stroke-dasharray="603.186"
                    stroke-dashoffset="0" />
        </svg>
        <div class="ring-center">
            <div class="time-display" id="display">25:00</div>
            <div class="time-sub" id="sub">готовий</div>
        </div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="buttons">
        <button class="primary" id="btn-start" onclick="handleStart()">Старт</button>
        <button id="btn-pause" onclick="handlePause()" disabled>Пауза</button>
        <button id="btn-skip"  onclick="handleSkip()">⏭</button>
    </div>

    <p class="status" id="status"></p>
    <button class="reset-link" id="btn-reset" onclick="handleReset()">скинути сесію</button>

    <details class="history" id="history">
        <summary>
            <span>📜 Історія</span>
            <span class="today-stats" id="today-stats">—</span>
        </summary>
        <div class="history-actions">
            <button class="mini" onclick="exportLog()">📥 Експорт</button>
            <button class="mini" onclick="document.getElementById('import-file').click()">📤 Імпорт</button>
            <button class="mini danger" onclick="clearLog()">🗑 Очистити</button>
            <input type="file" id="import-file" accept="application/json" hidden onchange="importLog(event)" />
        </div>
        <div id="history-list" class="history-list"></div>
    </details>

    <details class="settings" id="settings">
        <summary>
            <span>⚙️ Налаштування</span>
            <span class="settings-hint" id="settings-hint">за замовчуванням</span>
        </summary>
        <form class="settings-form" id="settings-form" onsubmit="event.preventDefault(); handleSaveSettings();">
            <div class="field">
                <label for="set-work">Робота (хв)</label>
                <input type="number" id="set-work" name="workMin" min="1" max="180" step="1" />
            </div>
            <div class="field">
                <label for="set-short">Коротка перерва (хв)</label>
                <input type="number" id="set-short" name="shortMin" min="1" max="60" step="1" />
            </div>
            <div class="field">
                <label for="set-long">Довга перерва (хв)</label>
                <input type="number" id="set-long" name="longMin" min="1" max="120" step="1" />
            </div>
            <div class="field">
                <label for="set-cycle">Помідорів до довгої</label>
                <input type="number" id="set-cycle" name="cycle" min="2" max="12" step="1" />
            </div>
            <div class="field">
                <label for="set-sound">Звук</label>
                <label class="toggle">
                    <input type="checkbox" id="set-sound" name="soundOn" />
                    <span class="slider"></span>
                </label>
            </div>
            <div class="field">
                <label for="set-auto">Авто-старт перерв</label>
                <label class="toggle">
                    <input type="checkbox" id="set-auto" name="autoStartBreaks" />
                    <span class="slider"></span>
                </label>
            </div>
            <p class="settings-note" id="settings-note"></p>
            <div class="settings-actions">
                <button type="submit" class="mini">💾 Зберегти</button>
                <button type="button" class="mini" onclick="handleResetSettings()">↺ За замовчуванням</button>
            </div>
        </form>
    </details>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script>
    const CIRCUMFERENCE = 2 * Math.PI * 96;
    const STORAGE_KEY  = 'pomodoro.sessions.v1';
    const SETTINGS_KEY = 'pomodoro.settings.v1';

    const DEFAULT_SETTINGS = {
        workMin: 25,
        shortMin: 5,
        longMin: 15,
        cycle: 4,
        soundOn: true,
        autoStartBreaks: true,
    };

    const settingsStore = {
        load() {
            try {
                const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
                return { ...DEFAULT_SETTINGS, ...saved };
            } catch { return { ...DEFAULT_SETTINGS }; }
        },
        save(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); },
        reset() { localStorage.removeItem(SETTINGS_KEY); },
    };

    let settings = settingsStore.load();

    const PHASES = {
        work:  { label: 'РОБОТА',          sub: 'фокусуйся',  color: 'var(--accent-work)'  },
        short: { label: 'КОРОТКА ПЕРЕРВА', sub: 'відпочинь',  color: 'var(--accent-short)' },
        long:  { label: 'ДОВГА ПЕРЕРВА',   sub: 'розслабся',  color: 'var(--accent-long)'  },
    };

    function phaseMinutes(p) {
        if (p === 'work')  return settings.workMin;
        if (p === 'short') return settings.shortMin;
        return settings.longMin;
    }

    let phase         = 'work';
    let totalSeconds  = phaseMinutes('work') * 60;
    let remaining     = totalSeconds;
    let interval      = null;
    let running       = false;
    let pomodoroCount = 0;
    let sessionStart  = null;

    const displayEl  = document.getElementById('display');
    const subEl      = document.getElementById('sub');
    const ring       = document.getElementById('ring');
    const phaseLabel = document.getElementById('phase-label');
    const dotsEl     = document.getElementById('dots');
    const btnStart   = document.getElementById('btn-start');
    const btnPause   = document.getElementById('btn-pause');
    const btnSkip    = document.getElementById('btn-skip');
    const statusEl   = document.getElementById('status');

    // -------- persistence (swap for fetch() when сервер з'явиться) --------
    const store = {
        all() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
            catch { return []; }
        },
        save(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); },
        add(record) {
            const list = this.all();
            list.push(record);
            this.save(list);
        },
        merge(incoming) {
            const list = this.all();
            const seen = new Set(list.map(r => r.id));
            for (const r of incoming) if (!seen.has(r.id)) list.push(r);
            list.sort((a, b) => a.startedAt - b.startedAt);
            this.save(list);
        },
        clear() { localStorage.removeItem(STORAGE_KEY); },
    };

    // -------- audio / сповіщення / вкладка --------
    let audioCtx = null;
    const ORIGINAL_TITLE = document.title;
    let titleInterval = null;

    function ensureAudio() {
        if (!audioCtx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            audioCtx = new Ctx();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, startAt, duration = 0.3, volume = 0.18) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0, startAt);
        gain.gain.linearRampToValueAtTime(volume, startAt + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startAt + duration);
        osc.start(startAt);
        osc.stop(startAt + duration);
    }

    function playChime(kind) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        if (kind === 'work') {
            playTone(523.25, t,        0.20); // C5
            playTone(659.25, t + 0.12, 0.20); // E5
            playTone(783.99, t + 0.24, 0.45); // G5
        } else {
            playTone(587.33, t,        0.28); // D5
            playTone(880.00, t + 0.18, 0.45); // A5
        }
    }

    function requestNotifPermission() {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'default') Notification.requestPermission();
    }

    function notify(title, body) {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;
        try {
            const n = new Notification(title, { body, silent: true });
            n.onclick = () => { window.focus(); n.close(); };
        } catch {}
    }

    function flashTitle(text) {
        stopTitleFlash();
        let on = false;
        titleInterval = setInterval(() => {
            document.title = on ? ORIGINAL_TITLE : text;
            on = !on;
        }, 1000);
    }

    function stopTitleFlash() {
        if (titleInterval) {
            clearInterval(titleInterval);
            titleInterval = null;
            document.title = ORIGINAL_TITLE;
        }
    }

    function signalFinish(endedPhase) {
        if (settings.soundOn) {
            playChime(endedPhase === 'work' ? 'work' : 'break');
        }
        if (endedPhase === 'work') {
            notify('🍅 Робочий блок завершено', 'Час перерви');
            if (document.hidden) flashTitle('🔔 Перерва! — Pomodoro');
        } else {
            notify('⚡ Перерва завершена', 'Час повертатися до роботи');
            if (document.hidden) flashTitle('🔔 До роботи! — Pomodoro');
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) stopTitleFlash();
    });

    function newId() {
        return (crypto.randomUUID && crypto.randomUUID())
            || `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function logSession(outcome) {
        if (!sessionStart) return;
        const record = {
            id: newId(),
            type: phase,
            startedAt: sessionStart,
            finishedAt: Date.now(),
            plannedSec: totalSeconds,
            actualSec: totalSeconds - remaining,
            outcome, // 'completed' | 'skipped'
            pomodoro: (phase === 'work' && outcome === 'completed') ? pomodoroCount : null,
        };
        store.add(record);
        sessionStart = null;
        renderHistory();
    }

    // -------- утиліти часу --------
    function pad(n) { return String(n).padStart(2, '0'); }

    function formatTime(s) {
        if (s >= 3600) {
            return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
        }
        return `${pad(Math.floor(s/60))}:${pad(s%60)}`;
    }

    function formatDuration(sec) {
        if (sec >= 3600) {
            const h = Math.floor(sec/3600);
            const m = Math.round((sec%3600)/60);
            return `${h}г ${m}хв`;
        }
        if (sec >= 60) return `${Math.round(sec/60)}хв`;
        return `${sec}с`;
    }

    function dayKey(ts) {
        const d = new Date(ts);
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function formatDate(key) {
        const [y, m, d] = key.split('-').map(Number);
        const date = new Date(y, m - 1, d);
        const today = new Date();
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        const sameDay = (a, b) => a.toDateString() === b.toDateString();
        if (sameDay(date, today))     return 'Сьогодні';
        if (sameDay(date, yesterday)) return 'Вчора';
        return date.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
    }

    function formatClock(ts) {
        const d = new Date(ts);
        return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // -------- рендер таймера --------
    function animateRing(pct, duration = 600) {
        const offset = CIRCUMFERENCE * (1 - pct);
        anime({ targets: ring, strokeDashoffset: offset, duration, easing: 'easeOutQuart' });
    }

    function setDanger(on) {
        displayEl.classList.toggle('danger', on);
        ring.style.stroke = on ? 'var(--danger)' : PHASES[phase].color;
    }

    function applyPhase() {
        document.documentElement.style.setProperty('--accent', PHASES[phase].color);
        ring.style.stroke = PHASES[phase].color;
        phaseLabel.textContent = PHASES[phase].label;
    }

    function renderDots() {
        dotsEl.innerHTML = '';
        const cycle = settings.cycle;
        const done = phase === 'work'
            ? pomodoroCount % cycle
            : ((pomodoroCount - 1) % cycle) + 1;
        const current = phase === 'work' ? pomodoroCount % cycle : -1;
        for (let i = 0; i < cycle; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            if (i < done) d.classList.add('done');
            else if (i === current) d.classList.add('current');
            dotsEl.appendChild(d);
        }
    }

    function updateUI() {
        displayEl.textContent = formatTime(remaining);
        animateRing(totalSeconds > 0 ? remaining / totalSeconds : 0);
        setDanger(remaining <= 10 && remaining > 0 && running);
    }

    // -------- фази --------
    function loadPhase(newPhase, { autoStart } = { autoStart: false }) {
        phase = newPhase;
        totalSeconds = phaseMinutes(phase) * 60;
        remaining = totalSeconds;
        applyPhase();
        renderDots();
        displayEl.textContent = formatTime(remaining);
        subEl.textContent = PHASES[phase].sub;
        setDanger(false);
        animateRing(1, 600);

        if (autoStart) {
            startRunning();
        } else {
            running = false;
            ring.classList.remove('pulsing');
            btnStart.disabled = false;
            btnPause.disabled = true;
            btnPause.textContent = 'Пауза';
        }
    }

    function startRunning() {
        if (sessionStart === null) sessionStart = Date.now();
        ensureAudio();
        running = true;
        ring.classList.add('pulsing');
        btnStart.disabled = true;
        btnPause.disabled = false;
        statusEl.textContent = '';

        anime({
            targets: ring,
            strokeDashoffset: [CIRCUMFERENCE, CIRCUMFERENCE * (1 - remaining / totalSeconds)],
            duration: 800,
            easing: 'easeOutExpo',
            complete: () => {
                updateUI();
                interval = setInterval(tick, 1000);
            }
        });
    }

    function handleStart() {
        requestNotifPermission();
        startRunning();
    }

    function tick() {
        if (remaining <= 0) { finishPhase(); return; }
        remaining--;

        displayEl.classList.remove('tick');
        void displayEl.offsetWidth;
        displayEl.classList.add('tick');

        updateUI();
        if (remaining === 0) finishPhase();
    }

    function finishPhase() {
        clearInterval(interval); interval = null; running = false;
        ring.classList.remove('pulsing');
        setDanger(false);
        signalFinish(phase);

        anime({
            targets: '#card',
            translateY: [0, -6, 0, -3, 0],
            duration: 500,
            easing: 'easeInOutSine'
        });

        if (phase === 'work') {
            pomodoroCount++;
            logSession('completed');
            const next = (pomodoroCount % settings.cycle === 0) ? 'long' : 'short';
            statusEl.textContent = `🍅 ${pomodoroCount} — перерва починається…`;
            setTimeout(() => loadPhase(next, { autoStart: settings.autoStartBreaks }), 1200);
        } else {
            logSession('completed');
            statusEl.textContent = 'готовий до нового помідора';
            setTimeout(() => loadPhase('work', { autoStart: false }), 1200);
        }
    }

    function handlePause() {
        if (!running) {
            running = true;
            ring.classList.add('pulsing');
            interval = setInterval(tick, 1000);
            btnPause.textContent = 'Пауза';
            subEl.textContent = PHASES[phase].sub;
        } else {
            running = false;
            ring.classList.remove('pulsing');
            clearInterval(interval); interval = null;
            btnPause.textContent = 'Далі';
            subEl.textContent = 'пауза';
        }
    }

    function handleSkip() {
        clearInterval(interval); interval = null; running = false;
        ring.classList.remove('pulsing');
        logSession('skipped');

        if (phase === 'work') {
            pomodoroCount++;
            const next = (pomodoroCount % settings.cycle === 0) ? 'long' : 'short';
            loadPhase(next, { autoStart: false });
        } else {
            loadPhase('work', { autoStart: false });
        }
        statusEl.textContent = 'пропущено';
    }

    function handleReset() {
        clearInterval(interval); interval = null; running = false;
        logSession('skipped');
        pomodoroCount = 0;
        loadPhase('work', { autoStart: false });
        statusEl.textContent = 'сесію скинуто';
    }

    // -------- історія --------
    function renderHistory() {
        const list = store.all();
        const listEl = document.getElementById('history-list');
        const statsEl = document.getElementById('today-stats');

        const todayK = dayKey(Date.now());
        const todayAll = list.filter(r => dayKey(r.startedAt) === todayK && r.outcome === 'completed');
        const todayWork = todayAll.filter(r => r.type === 'work');
        const focusSec = todayWork.reduce((s, r) => s + r.actualSec, 0);

        if (todayWork.length > 0) {
            statsEl.textContent = `${todayWork.length}🍅 · ${formatDuration(focusSec)}`;
        } else if (todayAll.length > 0) {
            const breakSec = todayAll.reduce((s, r) => s + r.actualSec, 0);
            statsEl.textContent = `0🍅 · ${formatDuration(breakSec)} перерв`;
        } else {
            statsEl.textContent = 'сьогодні пусто';
        }

        if (list.length === 0) {
            listEl.innerHTML = '<div class="history-empty">ще нема записів</div>';
            return;
        }

        const byDay = {};
        for (const r of list) {
            const k = dayKey(r.startedAt);
            (byDay[k] = byDay[k] || []).push(r);
        }
        const days = Object.keys(byDay).sort((a, b) => b.localeCompare(a));

        listEl.innerHTML = '';
        for (const day of days) {
            const records = byDay[day].slice().sort((a, b) => a.startedAt - b.startedAt);
            const workDone = records.filter(r => r.type === 'work' && r.outcome === 'completed');
            const daySec = workDone.reduce((s, r) => s + r.actualSec, 0);

            const dayEl = document.createElement('div');
            dayEl.className = 'day';

            const head = document.createElement('div');
            head.className = 'day-head';
            head.innerHTML = `
                <span class="date">${formatDate(day)}</span>
                <span class="meta">${workDone.length}🍅 · ${formatDuration(daySec)}</span>
            `;
            dayEl.appendChild(head);

            const sessEl = document.createElement('div');
            sessEl.className = 'sessions';
            for (const r of records) {
                const row = document.createElement('div');
                row.className = 'session' + (r.outcome === 'skipped' ? ' skipped' : '');
                row.innerHTML = `
                    <span class="time">${formatClock(r.startedAt)}</span>
                    <span class="type ${r.type}">${PHASES[r.type].label.toLowerCase()}</span>
                    <span class="dur">${formatDuration(r.actualSec)}</span>
                `;
                sessEl.appendChild(row);
            }
            dayEl.appendChild(sessEl);
            listEl.appendChild(dayEl);
        }
    }

    function exportLog() {
        const list = store.all();
        if (list.length === 0) { statusEl.textContent = 'нема чого експортувати'; return; }
        const blob = new Blob([JSON.stringify(list, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pomodoro-log-${dayKey(Date.now())}.json`;
        a.click();
        URL.revokeObjectURL(url);
        statusEl.textContent = `експортовано ${list.length}`;
    }

    function importLog(ev) {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const incoming = JSON.parse(reader.result);
                if (!Array.isArray(incoming)) throw new Error('not an array');
                const before = store.all().length;
                store.merge(incoming);
                const after = store.all().length;
                statusEl.textContent = `+${after - before} нових записів`;
                renderHistory();
            } catch {
                statusEl.textContent = 'помилка імпорту';
            }
            ev.target.value = '';
        };
        reader.readAsText(file);
    }

    function clearLog() {
        if (!confirm('Видалити всю історію?')) return;
        store.clear();
        statusEl.textContent = 'історію очищено';
        renderHistory();
    }

    // -------- налаштування --------
    function isDefaultSettings(s) {
        return Object.keys(DEFAULT_SETTINGS).every(k => s[k] === DEFAULT_SETTINGS[k]);
    }

    function renderSettingsHint() {
        const hint = document.getElementById('settings-hint');
        hint.textContent = isDefaultSettings(settings)
            ? 'за замовчуванням'
            : `${settings.workMin}/${settings.shortMin}/${settings.longMin} · ×${settings.cycle}`;
    }

    function renderSettings() {
        document.getElementById('set-work').value  = settings.workMin;
        document.getElementById('set-short').value = settings.shortMin;
        document.getElementById('set-long').value  = settings.longMin;
        document.getElementById('set-cycle').value = settings.cycle;
        document.getElementById('set-sound').checked = settings.soundOn;
        document.getElementById('set-auto').checked  = settings.autoStartBreaks;
        renderSettingsHint();
    }

    function readSettingsForm() {
        const num = (id, min, max, label) => {
            const v = parseInt(document.getElementById(id).value, 10);
            if (isNaN(v) || v < min || v > max) {
                throw new Error(`${label}: ${min}–${max}`);
            }
            return v;
        };
        return {
            workMin:  num('set-work',  1, 180, 'Робота'),
            shortMin: num('set-short', 1, 60,  'Коротка'),
            longMin:  num('set-long',  1, 120, 'Довга'),
            cycle:    num('set-cycle', 2, 12,  'Цикл'),
            soundOn:  document.getElementById('set-sound').checked,
            autoStartBreaks: document.getElementById('set-auto').checked,
        };
    }

    let noteTimer = null;
    function setNote(text, kind = '') {
        const note = document.getElementById('settings-note');
        note.textContent = text;
        note.className = 'settings-note' + (kind ? ' ' + kind : '');
        clearTimeout(noteTimer);
        if (text) {
            noteTimer = setTimeout(() => {
                note.textContent = '';
                note.className = 'settings-note';
            }, 3000);
        }
    }

    function applySettings(newSettings) {
        const wasRunning = running;
        settings = newSettings;
        settingsStore.save(settings);
        renderSettingsHint();

        if (wasRunning) {
            renderDots();
            return 'pending';
        }
        loadPhase(phase, { autoStart: false });
        return 'applied';
    }

    function handleSaveSettings() {
        let newSettings;
        try {
            newSettings = readSettingsForm();
        } catch (e) {
            setNote(e.message, 'err');
            return;
        }
        const result = applySettings(newSettings);
        if (result === 'pending') setNote('застосується після поточної фази', 'warn');
        else                      setNote('збережено ✓', 'ok');
    }

    function handleResetSettings() {
        settingsStore.reset();
        settings = { ...DEFAULT_SETTINGS };
        renderSettings();
        if (running) {
            renderDots();
            setNote('застосується після поточної фази', 'warn');
        } else {
            loadPhase(phase, { autoStart: false });
            setNote('скинуто до стандартних', 'ok');
        }
    }

    // -------- init --------
    applyPhase();
    renderDots();
    renderHistory();
    renderSettings();
</script>
</body>
</html>
